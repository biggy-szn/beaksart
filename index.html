<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEEP SEA</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; cursor:none; }

  #c { display:block; position:fixed; top:0; left:0; }

  /* Cursor — a soft pressure wave */
  #cur {
    position:fixed; pointer-events:none; z-index:9999;
    width:16px; height:16px; border-radius:50%;
    border:1px solid rgba(100,220,255,0.25);
    transform:translate(-50%,-50%);
    transition: width .18s, height .18s, border-color .18s;
    box-shadow: 0 0 12px rgba(80,200,255,0.1);
  }
  #cur.press { width:28px; height:28px; border-color:rgba(100,220,255,0.5); }

  /* Overlay */
  #ov {
    position:fixed; inset:0;
    background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:300; transition:opacity 2s ease;
  }
  #ov.gone { opacity:0; pointer-events:none; }
  #ov-inner { text-align:center; animation:rise 1.4s ease both; }
  @keyframes rise { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

  .ov-label {
    font-size:10px; letter-spacing:10px; color:rgba(80,200,255,0.25);
    text-transform:uppercase; font-family:'Georgia',serif; margin-bottom:44px;
  }
  .ov-glyph {
    font-size:46px; margin-bottom:38px; opacity:0.1;
    animation: glyph 3s ease-in-out infinite alternate;
  }
  @keyframes glyph { from{opacity:0.06} to{opacity:0.18} }

  #di {
    background:transparent; border:none;
    border-bottom:1px solid rgba(60,180,220,0.18);
    color:rgba(140,220,255,0.85);
    font-family:'Georgia',serif; font-size:30px; letter-spacing:6px;
    text-align:center; width:220px; padding:10px 0; outline:none;
    caret-color:rgba(80,220,255,0.8);
  }
  #di::placeholder { color:rgba(60,160,200,0.15); }
  .ov-hint { margin-top:22px; font-size:10px; letter-spacing:5px; color:rgba(60,160,200,0.2); text-transform:uppercase; font-family:'Georgia',serif; }

  #tag {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    font-size:10px; letter-spacing:5px; color:rgba(80,180,220,0.12);
    text-transform:uppercase; font-family:'Georgia',serif;
    pointer-events:none; z-index:10; white-space:nowrap;
    animation:fi 5s ease 3s both;
  }
  @keyframes fi { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<div id="ov">
  <div id="ov-inner">
    <div class="ov-label">The Sunless Sea</div>
    <div class="ov-glyph">🪼</div>
    <input id="di" type="text" placeholder="MM / DD" maxlength="7" autocomplete="off" spellcheck="false"/>
    <div class="ov-hint">your day &nbsp;·&nbsp; press enter</div>
  </div>
</div>

<div id="cur"></div>
<canvas id="c"></canvas>
<div id="tag">sink deeper &nbsp;·&nbsp; they can feel you</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const ov     = document.getElementById('ov');
const di     = document.getElementById('di');
const cur    = document.getElementById('cur');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;
let mouse = {x:W/2, y:H/2};
let userDay = -1, started = false, T = 0;

// ── Input ─────────────────────────────────────────────────
di.focus();
di.addEventListener('input', e=>{
  let v=e.target.value.replace(/\D/g,'');
  if(v.length>2) v=v.slice(0,2)+' / '+v.slice(2,4);
  e.target.value=v;
});
di.addEventListener('keydown', e=>{ if(e.key==='Enter') begin(); });

function dayOfYear(m,d){
  const mo=[0,31,28,31,30,31,30,31,31,30,31,30,31];
  let n=d-1; for(let i=1;i<m;i++) n+=mo[i];
  return Math.max(0,Math.min(364,n));
}

function begin(){
  const r=di.value.replace(/\s/g,'').replace('/','');
  userDay=dayOfYear(parseInt(r.slice(0,2))||6, parseInt(r.slice(2,4))||15);
  ov.classList.add('gone'); started=true;
  init(); requestAnimationFrame(loop);
}

// ── Seeded random ─────────────────────────────────────────
function hash(n){ return Math.abs((Math.sin(n*127.1+311.7)*43758.5453)%1); }

// ── Creature types ────────────────────────────────────────
// 0=jellyfish 1=lanternfish 2=anglerfish 3=siphonophore 4=unnamed
function creatureType(i){ return Math.floor(hash(i*3.7)*5); }

// Color palette per type
const PALETTES = [
  [190,80,95],   // jellyfish — cyan-blue
  [130,90,80],   // lanternfish — warm amber
  [270,60,65],   // anglerfish — violet
  [160,75,70],   // siphonophore — teal-green
  [220,50,60],   // unnamed — cold indigo
];

// ── Particle system ───────────────────────────────────────
let sparks=[], trails=[], blooms=[];

class Spark {
  constructor(x,y,h,s,l){
    this.x=x+(Math.random()-.5)*20; this.y=y+(Math.random()-.5)*20;
    this.vx=(Math.random()-.5)*1.4; this.vy=-(0.2+Math.random()*1.2);
    this.r=0.6+Math.random()*2; this.a=0.6+Math.random()*.3;
    this.h=h; this.s=s; this.l=l;
    this.life=60+Math.random()*100; this.age=0;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.004; this.vx*=0.99; this.age++; return this.age<this.life; }
  draw(){
    const f=1-this.age/this.life;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*f,0,Math.PI*2);
    ctx.fillStyle=`hsla(${this.h},${this.s}%,${this.l}%,${this.a*f})`; ctx.fill();
  }
}

class Bloom {
  constructor(x,y,pal){
    this.x=x; this.y=y; this.pal=pal;
    this.rings=[]; this.age=0; this.life=180;
    for(let i=0;i<5;i++) this.rings.push({r:0,maxR:40+i*35,speed:1.2+i*0.3,a:0.5/(i+1)});
  }
  update(){ this.age++; this.rings.forEach(r=>{r.r+=r.speed;}); return this.age<this.life; }
  draw(){
    const f=1-this.age/this.life;
    this.rings.forEach(r=>{
      if(r.r>r.maxR) return;
      const a=r.a*(1-r.r/r.maxR)*f;
      ctx.beginPath(); ctx.arc(this.x,this.y,r.r,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${this.pal[0]},${this.pal[1]}%,${this.pal[2]}%,${a})`;
      ctx.lineWidth=1; ctx.stroke();
    });
  }
}

// ── Creature base ─────────────────────────────────────────
class Creature {
  constructor(i){
    this.i=i;
    this.type=creatureType(i);
    this.isYourDay=(i===userDay);
    this.pal=this.isYourDay ? [55,100,80] : [...PALETTES[this.type]];
    if(!this.isYourDay) this.pal[0]+=(hash(i*5)-0.5)*25;

    // Position — scattered but weighted toward center
    const angle=hash(i*2.3)*Math.PI*2;
    const rad=Math.sqrt(hash(i*1.7))*(Math.min(W,H)*0.42);
    this.bx=W/2+Math.cos(angle)*rad;
    this.by=H/2+Math.sin(angle)*rad;
    this.x=this.bx; this.y=this.by;

    // Drift
    this.da=hash(i*4.1)*Math.PI*2;
    this.ds=0.00015+hash(i*3.3)*0.0002;
    this.dr=12+hash(i*5.2)*22;
    this.dOff=hash(i*6.8)*Math.PI*2;
    this.bobAmp=3+hash(i*7.1)*8;
    this.bobSpeed=0.0008+hash(i*8.3)*0.0012;

    // State
    this.size=this.isYourDay ? 1.7 : 0.7+hash(i*9.4)*0.9;
    this.brightness=this.isYourDay ? 1.0 : 0.3+hash(i*10.1)*0.35;
    this.brightTarget=this.brightness;
    this.pulse=0;
    this.pulseSpeed=0.0008+hash(i*11.2)*0.0015;
    this.hover=0;
    this.clicks=0;
    this.lastClick=0;
    this.bloom=false; this.bloomTimer=0;
    this.fled=false; this.fledVx=0; this.fledVy=0;
    this.curious=false;

    // Tentacle / appendage phase offsets
    this.tentPhase=[];
    const tn=this.type===0?8:this.type===3?12:4;
    for(let t=0;t<tn;t++) this.tentPhase.push(hash(i*20+t)*Math.PI*2);
    this.tentCount=tn;

    // Special year-day biolum pattern
    this.spotCount=Math.floor(hash(i*12)*4)+2;
  }

  update(dt){
    const dT=T*this.ds+this.dOff;
    let tx=this.bx+Math.cos(dT)*this.dr;
    let ty=this.by+Math.sin(dT*1.37)*this.dr*0.7 + Math.sin(T*this.bobSpeed)*this.bobAmp;

    // Cursor interaction
    const dx=mouse.x-this.x, dy=mouse.y-this.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    const inf=Math.max(0,1-d/130);

    // Fled behaviour
    if(this.fled){
      this.x+=this.fledVx; this.y+=this.fledVy;
      this.fledVx*=0.94; this.fledVy*=0.94;
      if(Math.abs(this.fledVx)<0.05&&Math.abs(this.fledVy)<0.05){ this.fled=false; }
    }

    // Curious — drift slightly toward cursor
    if(this.curious && !this.fled){
      tx+=dx*0.04*inf;
      ty+=dy*0.04*inf;
    } else if(!this.fled && inf>0.3){
      // Slight retreat
      tx-=dx*0.015*inf;
      ty-=dy*0.015*inf;
    }

    this.x+=(tx-this.x)*0.018;
    this.y+=(ty-this.y)*0.018;

    // Curiosity probability
    if(Math.random()<0.0008&&inf>0.2&&!this.fled) this.curious=!this.curious;

    this.pulse=Math.sin(T*this.pulseSpeed)*0.5+0.5;

    // Hover
    const ht=Math.max(0,1-d/80);
    this.hover+=(ht-this.hover)*0.1;

    // Brightness
    if(!this.isYourDay){
      const age=T-this.lastClick;
      if(this.clicks>0&&age>6000) this.brightTarget=Math.max(0.2,this.brightTarget-0.00003);
      if(this.clicks===0&&T>25000) this.brightTarget=Math.max(0.08,this.brightTarget-0.000012);
    }
    this.brightness+=(this.brightTarget-this.brightness)*0.025;

    // Bloom
    if(this.bloom){ this.bloomTimer+=dt; if(this.bloomTimer>800) this.bloom=false; }
  }

  handleClick(){
    this.clicks++; this.lastClick=T;
    this.brightTarget=Math.min(1,this.brightTarget+0.45);
    this.bloom=true; this.bloomTimer=0;
    this.fled=true;
    const ang=Math.atan2(this.y-mouse.y, this.x-mouse.x);
    const speed=2+Math.random()*2.5;
    this.fledVx=Math.cos(ang)*speed; this.fledVy=Math.sin(ang)*speed;
    this.curious=false;

    const [h,s,l]=this.pal;
    for(let i=0;i<18+this.clicks*3;i++) sparks.push(new Spark(this.x,this.y,h,s,l));
    blooms.push(new Bloom(this.x,this.y,this.pal));
  }

  draw(){
    const sz=this.size;
    const br=this.brightness*(0.6+this.pulse*0.4);
    const ho=this.hover;
    const [h,s,l]=this.pal;
    const x=this.x, y=this.y;

    ctx.save();

    // Outer glow (aura)
    const glowLayers = this.isYourDay ? 5 : 3;
    for(let g=glowLayers;g>=0;g--){
      const gr=sz*(20+g*(this.isYourDay?18:12));
      const ga=br*0.04/(g+1)*(this.isYourDay?2:1);
      const gg=ctx.createRadialGradient(x,y,0,x,y,gr);
      gg.addColorStop(0,`hsla(${h},${s}%,${l}%,${ga})`);
      gg.addColorStop(1,'hsla(0,0%,0%,0)');
      ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(x,y,gr,0,Math.PI*2); ctx.fill();
    }

    if(this.type===0) this.drawJellyfish(x,y,sz,br,h,s,l,ho);
    else if(this.type===1) this.drawLanternfish(x,y,sz,br,h,s,l,ho);
    else if(this.type===2) this.drawAnglerfish(x,y,sz,br,h,s,l,ho);
    else if(this.type===3) this.drawSiphonophore(x,y,sz,br,h,s,l,ho);
    else this.drawUnnamed(x,y,sz,br,h,s,l,ho);

    // YOUR DAY — golden shimmer ring
    if(this.isYourDay){
      const p=Math.sin(T*0.0018)*0.5+0.5;
      const rr=sz*28+p*10;
      ctx.beginPath(); ctx.arc(x,y,rr,0,Math.PI*2);
      ctx.strokeStyle=`hsla(50,100%,75%,${0.12+p*0.18})`;
      ctx.lineWidth=1.5+p; ctx.stroke();

      // Second orbit ring
      ctx.save(); ctx.translate(x,y); ctx.rotate(T*0.0007);
      ctx.beginPath(); ctx.arc(0,0,sz*40,0,Math.PI*2);
      ctx.strokeStyle=`hsla(55,100%,70%,${0.04+p*0.06})`;
      ctx.lineWidth=0.8; ctx.setLineDash([4,14]); ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  // ── Jellyfish ──────────────────────────────────────────
  drawJellyfish(x,y,sz,br,h,s,l,ho){
    const R=sz*11;
    const pulse=Math.sin(T*this.pulseSpeed*1.5)*0.12;

    // Bell
    const grad=ctx.createRadialGradient(x,y-R*0.2,0,x,y,R*(1+pulse));
    grad.addColorStop(0,`hsla(${h},${s}%,${l}%,${br*0.55})`);
    grad.addColorStop(0.5,`hsla(${h},${s}%,${l*0.7}%,${br*0.25})`);
    grad.addColorStop(1,`hsla(${h},${s}%,${l*0.4}%,0)`);
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.ellipse(x,y-R*0.2, R*(1+pulse), R*0.75*(1+pulse), 0, Math.PI,0);
    ctx.fill();

    // Bell rim
    ctx.beginPath();
    ctx.ellipse(x,y-R*0.2, R*(1+pulse), R*0.75*(1+pulse), 0, Math.PI,0);
    ctx.strokeStyle=`hsla(${h},${s+10}%,${l+15}%,${br*0.4})`;
    ctx.lineWidth=1; ctx.stroke();

    // Inner organs
    const og=ctx.createRadialGradient(x,y-R*0.4,0,x,y-R*0.4,R*0.4);
    og.addColorStop(0,`hsla(${h+20},${s}%,${l+10}%,${br*0.3})`);
    og.addColorStop(1,'hsla(0,0%,0%,0)');
    ctx.fillStyle=og; ctx.beginPath(); ctx.ellipse(x,y-R*0.4,R*0.35,R*0.25,0,0,Math.PI*2); ctx.fill();

    // Tentacles
    for(let t=0;t<this.tentCount;t++){
      const tx=x+(t/(this.tentCount-1)-0.5)*R*1.6;
      const phase=this.tentPhase[t]+T*0.001;
      ctx.beginPath(); ctx.moveTo(tx,y);
      const segs=8, segLen=R*0.55+R*0.15*(1+pulse);
      let cx2=tx,cy2=y;
      for(let sg=0;sg<segs;sg++){
        const wave=Math.sin(phase+sg*0.7)*(4+sg*1.2)*sz*0.3;
        cx2+=wave*(sg%2?1:-1)*0.3; cy2+=segLen/segs;
        ctx.lineTo(cx2,cy2);
      }
      ctx.strokeStyle=`hsla(${h},${s}%,${l}%,${br*(0.12+0.08*(this.tentCount-t)/this.tentCount)})`;
      ctx.lineWidth=0.6; ctx.stroke();
    }
  }

  // ── Lanternfish ───────────────────────────────────────
  drawLanternfish(x,y,sz,br,h,s,l,ho){
    const R=sz*9;
    ctx.save(); ctx.translate(x,y);

    // Body
    ctx.beginPath();
    ctx.ellipse(0,0,R,R*0.45,Math.PI/8,0,Math.PI*2);
    const bg=ctx.createRadialGradient(-R*0.2,0,0,0,0,R);
    bg.addColorStop(0,`hsla(${h},${s}%,${l+10}%,${br*0.75})`);
    bg.addColorStop(0.7,`hsla(${h},${s}%,${l}%,${br*0.35})`);
    bg.addColorStop(1,`hsla(${h},${s}%,${l*0.5}%,0)`);
    ctx.fillStyle=bg; ctx.fill();

    // Fin
    ctx.beginPath(); ctx.moveTo(R*0.3,-R*0.45); ctx.lineTo(R*0.7,-R*0.15); ctx.lineTo(R*0.4,0);
    ctx.closePath();
    ctx.fillStyle=`hsla(${h},${s}%,${l}%,${br*0.2})`; ctx.fill();

    // Tail
    ctx.beginPath(); ctx.moveTo(-R,0); ctx.lineTo(-R*1.4,-R*0.35); ctx.lineTo(-R*1.4,R*0.35); ctx.closePath();
    ctx.fillStyle=`hsla(${h},${s}%,${l}%,${br*0.25})`; ctx.fill();

    // Bioluminescent spots
    for(let sp=0;sp<this.spotCount+3;sp++){
      const sx=(hash(this.i*30+sp)-0.5)*R*1.4;
      const sy=(hash(this.i*31+sp)-0.5)*R*0.7;
      const sr=1+hash(this.i*32+sp)*2.5;
      const pulse2=Math.sin(T*(0.001+hash(this.i*33+sp)*0.002)+hash(this.i*34+sp)*Math.PI*2)*0.5+0.5;
      ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2);
      ctx.fillStyle=`hsla(${h+20},${s+20}%,${l+20}%,${br*(0.4+pulse2*0.5)})`; ctx.fill();
      // Spot glow
      const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,sr*4);
      sg.addColorStop(0,`hsla(${h+20},${s+20}%,${l+20}%,${br*0.15*pulse2})`);
      sg.addColorStop(1,'hsla(0,0%,0%,0)');
      ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,sr*4,0,Math.PI*2); ctx.fill();
    }

    // Eye
    ctx.beginPath(); ctx.arc(R*0.55,R*-0.05,sz*1.6,0,Math.PI*2);
    ctx.fillStyle=`hsla(${h+30},${s+30}%,90%,${br*0.9})`; ctx.fill();
    ctx.restore();
  }

  // ── Anglerfish ────────────────────────────────────────
  drawAnglerfish(x,y,sz,br,h,s,l,ho){
    const R=sz*10;
    ctx.save(); ctx.translate(x,y);

    // Body — bulbous
    ctx.beginPath();
    ctx.ellipse(-R*0.1,0,R*0.9,R*0.72,0,0,Math.PI*2);
    const ag=ctx.createRadialGradient(-R*0.1,0,0,-R*0.1,0,R*0.9);
    ag.addColorStop(0,`hsla(${h},${s*0.6}%,${l*0.5}%,${br*0.7})`);
    ag.addColorStop(1,`hsla(${h},${s}%,${l}%,${br*0.1})`);
    ctx.fillStyle=ag; ctx.fill();
    ctx.strokeStyle=`hsla(${h},${s}%,${l+10}%,${br*0.2})`; ctx.lineWidth=1; ctx.stroke();

    // Menacing jaw
    ctx.beginPath();
    ctx.moveTo(-R*0.6,R*0.15); ctx.lineTo(R*0.7,R*0.25); ctx.lineTo(R*0.7,-R*0.1); ctx.lineTo(-R*0.6,-R*0.15);
    ctx.closePath();
    ctx.fillStyle=`hsla(${h},${s*0.4}%,8%,${br*0.8})`; ctx.fill();

    // Teeth
    const teeth=6;
    for(let t=0;t<teeth;t++){
      const tx=-R*0.5+t*(R*1.1/teeth);
      ctx.beginPath(); ctx.moveTo(tx,R*0.15); ctx.lineTo(tx+R*0.06,R*0.38); ctx.lineTo(tx+R*0.12,R*0.15);
      ctx.fillStyle=`hsla(${h+10},${s+10}%,${l+20}%,${br*0.6})`; ctx.fill();
    }

    // Lure
    const lurePhase=Math.sin(T*0.0014)*0.5;
    const lureX=R*0.6+Math.sin(T*0.0009)*R*0.15;
    const lureY=-R*(0.9+lurePhase*0.25);
    // Lure stem
    ctx.beginPath(); ctx.moveTo(R*0.3,-R*0.6); ctx.quadraticCurveTo(R*0.55,-R*0.7,lureX,lureY);
    ctx.strokeStyle=`hsla(${h},${s}%,${l}%,${br*0.3})`; ctx.lineWidth=1; ctx.stroke();
    // Lure light
    const lp=Math.sin(T*0.002)*0.5+0.5;
    const lg=ctx.createRadialGradient(lureX,lureY,0,lureX,lureY,sz*8);
    lg.addColorStop(0,`hsla(60,100%,88%,${br*(0.7+lp*0.3)})`);
    lg.addColorStop(0.3,`hsla(50,100%,70%,${br*0.3*lp})`);
    lg.addColorStop(1,'hsla(0,0%,0%,0)');
    ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(lureX,lureY,sz*8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(lureX,lureY,sz*2,0,Math.PI*2);
    ctx.fillStyle=`hsla(60,100%,95%,${br*0.9})`; ctx.fill();

    // Eye
    ctx.beginPath(); ctx.arc(R*0.35,-R*0.12,sz*2.2,0,Math.PI*2);
    ctx.fillStyle=`hsla(${h+40},100%,85%,${br*0.9})`; ctx.fill();
    ctx.restore();
  }

  // ── Siphonophore ─────────────────────────────────────
  drawSiphonophore(x,y,sz,br,h,s,l,ho){
    const segs=12; const segLen=sz*7;
    ctx.save(); ctx.translate(x,y);
    const masterPhase=T*0.0009;

    for(let sg=0;sg<segs;sg++){
      const wave=Math.sin(masterPhase+sg*0.55)*sz*(4+sg*0.3);
      const wave2=Math.cos(masterPhase*0.7+sg*0.4)*sz*2;
      const sx=wave; const sy=sg*segLen-segs*segLen*0.5;
      const alpha=br*(0.7-sg/segs*0.4);
      const segR=sz*(2.5-sg*0.1);

      // Nectophore (swimming bell)
      ctx.beginPath();
      ctx.ellipse(sx,sy,segR*1.2,segR,0,0,Math.PI*2);
      const sgg=ctx.createRadialGradient(sx,sy,0,sx,sy,segR*1.5);
      sgg.addColorStop(0,`hsla(${h},${s+10}%,${l+15}%,${alpha*0.65})`);
      sgg.addColorStop(1,`hsla(${h},${s}%,${l}%,0)`);
      ctx.fillStyle=sgg; ctx.fill();

      // Connecting strand
      if(sg<segs-1){
        const nw=Math.sin(masterPhase+sg*0.55+0.55)*sz*(4+(sg+1)*0.3);
        const ny=(sg+1)*segLen-segs*segLen*0.5;
        ctx.beginPath(); ctx.moveTo(sx,sy+segR); ctx.lineTo(nw+wave2,ny-segR);
        ctx.strokeStyle=`hsla(${h},${s}%,${l}%,${alpha*0.3})`;
        ctx.lineWidth=0.8; ctx.stroke();
      }

      // Trailing filament
      for(let f=0;f<2;f++){
        const fa=(f===0?-1:1);
        ctx.beginPath(); ctx.moveTo(sx,sy+segR*0.5);
        const flen=segLen*0.6;
        ctx.quadraticCurveTo(sx+fa*(sz*3+wave*0.2),sy+flen*0.5, sx+fa*sz*(1+sg*0.3),sy+flen);
        ctx.strokeStyle=`hsla(${h},${s}%,${l}%,${alpha*0.15})`;
        ctx.lineWidth=0.5; ctx.stroke();
      }
    }
    ctx.restore();
  }

  // ── Unnamed ───────────────────────────────────────────
  drawUnnamed(x,y,sz,br,h,s,l,ho){
    const R=sz*10;
    const numArms=5+Math.floor(hash(this.i*15)*4);
    ctx.save(); ctx.translate(x,y);

    // Central mass
    const cg=ctx.createRadialGradient(0,0,0,0,0,R*0.6);
    cg.addColorStop(0,`hsla(${h},${s}%,${l}%,${br*0.5})`);
    cg.addColorStop(1,'hsla(0,0%,0%,0)');
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(0,0,R*0.6,0,Math.PI*2); ctx.fill();

    // Arms — undulating
    for(let a=0;a<numArms;a++){
      const baseAng=(a/numArms)*Math.PI*2 + T*0.0003;
      const armLen=R*(0.9+hash(this.i*40+a)*0.5);
      ctx.beginPath(); ctx.moveTo(0,0);
      const pts=10;
      for(let p=1;p<=pts;p++){
        const t2=p/pts;
        const wave=Math.sin(T*0.0011+a*1.3+p*0.6)*sz*(1.5+p*0.5);
        const px=Math.cos(baseAng)*armLen*t2 + Math.cos(baseAng+Math.PI/2)*wave;
        const py=Math.sin(baseAng)*armLen*t2 + Math.sin(baseAng+Math.PI/2)*wave;
        ctx.lineTo(px,py);
      }
      ctx.strokeStyle=`hsla(${h},${s}%,${l}%,${br*(0.25-a*0.015)})`;
      ctx.lineWidth=sz*(1.2-a/numArms*0.6); ctx.stroke();

      // Tip bioluminescence
      const tipX=Math.cos(baseAng)*armLen*0.9;
      const tipY=Math.sin(baseAng)*armLen*0.9;
      const tp=Math.sin(T*0.002+a*1.1)*0.5+0.5;
      ctx.beginPath(); ctx.arc(tipX,tipY,sz*(0.8+tp*0.8),0,Math.PI*2);
      ctx.fillStyle=`hsla(${h+30},${s+20}%,${l+20}%,${br*(0.4+tp*0.5)})`; ctx.fill();
    }

    ctx.restore();
  }
}

// ── Scene particles ────────────────────────────────────────
let motes=[];
class Mote {
  constructor(){this.reset(true);}
  reset(r=false){
    this.x=Math.random()*W; this.y=r?Math.random()*H:H+5;
    this.vy=-(0.03+Math.random()*0.1); this.vx=(Math.random()-.5)*0.05;
    this.r=0.3+Math.random()*0.9; this.a=0.02+Math.random()*0.05;
    this.h=170+Math.random()*60;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; if(this.y<-4)this.reset(); }
  draw(){ ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`hsla(${this.h},60%,75%,${this.a})`;ctx.fill(); }
}

// ── Init ──────────────────────────────────────────────────
let creatures=[];
function init(){
  creatures=[];
  for(let i=0;i<365;i++) creatures.push(new Creature(i));
  for(let i=0;i<70;i++) motes.push(new Mote());
}

// ── Background ────────────────────────────────────────────
function drawBG(){
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.fillRect(0,0,W,H);

  // Deep water depth gradient
  const dg=ctx.createLinearGradient(0,0,0,H);
  dg.addColorStop(0,'rgba(0,5,18,0.06)');
  dg.addColorStop(1,'rgba(0,2,8,0.1)');
  ctx.fillStyle=dg; ctx.fillRect(0,0,W,H);
}

function drawVignette(){
  const v=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.85);
  v.addColorStop(0,'rgba(0,0,0,0)');
  v.addColorStop(1,'rgba(0,0,0,0.72)');
  ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
}

// ── Events ────────────────────────────────────────────────
window.addEventListener('mousemove',e=>{
  mouse.x=e.clientX; mouse.y=e.clientY;
  cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
});
window.addEventListener('mousedown',()=>cur.classList.add('press'));
window.addEventListener('mouseup',()=>cur.classList.remove('press'));

canvas.addEventListener('click',e=>{
  if(!started)return;
  const mx=e.clientX,my=e.clientY;
  let hit=null,minD=Infinity;
  creatures.forEach(c=>{
    const d=Math.hypot(c.x-mx,c.y-my);
    const threshold=c.size*22;
    if(d<threshold&&d<minD){minD=d;hit=c;}
  });
  if(hit) hit.handleClick();
});

window.addEventListener('resize',()=>{
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  if(started) creatures.forEach(c=>{
    const angle=hash(c.i*2.3)*Math.PI*2;
    const rad=Math.sqrt(hash(c.i*1.7))*(Math.min(W,H)*0.42);
    c.bx=W/2+Math.cos(angle)*rad;
    c.by=H/2+Math.sin(angle)*rad;
  });
});

// ── Loop ──────────────────────────────────────────────────
let lastT=0;
function loop(ts){
  const dt=Math.min(50,ts-lastT); lastT=ts; T=ts;

  drawBG();

  creatures.forEach(c=>c.update(dt));
  creatures.forEach(c=>c.draw());

  sparks=sparks.filter(s=>{const a=s.update();s.draw();return a;});
  blooms=blooms.filter(b=>{b.update();b.draw();return b.age<b.life;});
  motes.forEach(m=>{m.update();m.draw();});

  drawVignette();
  requestAnimationFrame(loop);
}

ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
</script>
